name: Nightly Tests (Full)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  full-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run maintained full CI contract
        run: npm run ci:local:full
