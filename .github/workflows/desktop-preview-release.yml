name: Elegy Copilot Desktop Preview Release

on:
  push:
    branches:
      - main
    tags:
      - '*.*.*'
      - '!v*'
      - '!desktop-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit to build'
        required: false
        default: 'main'
        type: string
      tag_name:
        description: 'GitHub release tag to create or update'
        required: true
        type: string
      release_name:
        description: 'Optional GitHub release title'
        required: false
        default: ''
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-preview-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-preview:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      release_target: ${{ steps.meta.outputs.release_target }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      main_push: ${{ steps.meta.outputs.main_push }}
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate publish-repo topology (fail closed)
        shell: bash
        run: |
          set -euo pipefail
          expected_repo="$(python - <<'PY'
          import json
          import pathlib

          package_json = json.loads(pathlib.Path('copilot-ui/package.json').read_text(encoding='utf-8'))
          publish_repository = ((package_json.get('desktopRelease') or {}).get('publishRepository') or '').strip()
          if not publish_repository:
              raise SystemExit('Could not resolve desktopRelease.publishRepository from copilot-ui/package.json')
          print(publish_repository)
          PY
          )"
          if [[ "${expected_repo}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "Desktop preview release must run from ${expected_repo}; current repository is ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Resolve preview release inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          ref="${{ inputs.ref }}"
          release_target=""
          tag_name="${{ inputs.tag_name }}"
          release_name="${{ inputs.release_name }}"
          prerelease="true"
          main_push="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" == "branch" && "${GITHUB_REF_NAME:-}" == "main" ]]; then
              ref="${GITHUB_SHA}"
              tag_name=""
              main_push="true"
            else
              if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                echo "Automatic desktop preview publishing only supports main pushes or non-prefixed semver tags like 1.2.3 or 1.2.3-rc.1." >&2
                exit 1
              fi

              ref="${GITHUB_REF_NAME}"
              tag_name="${GITHUB_REF_NAME}"
            fi
          fi

          if [[ -z "${ref}" ]]; then
            echo "A build ref is required." >&2
            exit 1
          fi

          if ! git rev-parse --verify --quiet "${ref}^{commit}" >/dev/null; then
            git fetch --depth=1 origin "${ref}"
          fi

          release_target="$(git rev-parse --verify "${ref}^{commit}")"

          package_version="$(python - "${ref}" <<'PY'
          import json
          import subprocess
          import sys

          ref = sys.argv[1]
          payload = subprocess.check_output(
              ["git", "show", f"{ref}:copilot-ui/package.json"],
              text=True,
          )
          print(json.loads(payload)["version"])
          PY
          )"

          if [[ "${main_push}" == "true" ]]; then
            tag_name="${package_version}"
          fi

          if [[ -z "${tag_name}" ]]; then
            echo "A preview tag name is required." >&2
            exit 1
          fi

          if [[ ! "${tag_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Desktop preview publishing only supports semver tags like 1.2.3 or 1.2.3-rc.1." >&2
            exit 1
          fi

          if [[ -z "${release_name}" ]]; then
            release_name="Elegy Copilot Desktop Preview ${tag_name}"
          fi

          if [[ "${package_version}" != "${tag_name}" ]]; then
            echo "Preview release tag '${tag_name}' must match copilot-ui/package.json version '${package_version}' at ref '${ref}'." >&2
            exit 1
          fi

          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "release_target=${release_target}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "main_push=${main_push}" >> "$GITHUB_OUTPUT"

  build-windows-preview:
    needs: resolve-preview
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ needs.resolve-preview.outputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup MSVC build environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: CI lockfile preflight
        run: node scripts/validate-ci-lockfiles.js

      - name: Install workspace dependencies
        run: npm ci
        env:
          npm_config_msvs_version: '2022'

      - name: Generate CLI artifacts
        run: |
          node scripts/generate-cli-manifest.mjs
          node scripts/generate-policy-lockfiles.js

      - name: Build and stage Windows preview package
        run: npm --prefix copilot-ui run desktop:preview:stage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Run native Windows preview acceptance
        run: npm --prefix copilot-ui run desktop:smoke:native
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prune stale desktop preview release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-preview.outputs.tag_name }}
        run: node scripts/prune-desktop-release-assets.js --repo "$GH_REPO" --release-tag "$RELEASE_TAG" --artifacts-dir release-artifacts/windows-tauri

      - name: Publish desktop preview GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-preview.outputs.tag_name }}
          RELEASE_TARGET: ${{ needs.resolve-preview.outputs.release_target }}
          RELEASE_NAME: ${{ needs.resolve-preview.outputs.release_name }}
          MAIN_PUSH: ${{ needs.resolve-preview.outputs.main_push }}
        run: |
          set -euo pipefail

          mapfile -t release_files < <(find release-artifacts/windows-tauri -type f | sort)
          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No desktop preview release files were found." >&2
            exit 1
          fi

          prerelease_flag=(--prerelease)

          if [[ "${MAIN_PUSH}" == "true" ]] && gh api "repos/${GH_REPO}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            gh api --method PATCH "repos/${GH_REPO}/git/refs/tags/${RELEASE_TAG}" -f sha="${RELEASE_TARGET}" -F force=true >/dev/null
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${GH_REPO}" --draft=false --target "${RELEASE_TARGET}" --title "${RELEASE_NAME}" "${prerelease_flag[@]}"
            gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" "${release_files[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" --repo "${GH_REPO}" "${release_files[@]}" --target "${RELEASE_TARGET}" --title "${RELEASE_NAME}" --generate-notes "${prerelease_flag[@]}"
          fi

      - name: Publish updater feed
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t updater_files < <(find release-artifacts/windows-tauri -maxdepth 1 -type f \( -name '*-latest.json' -o -name '*.sig' \) | sort)
          if [[ "${#updater_files[@]}" -lt 2 ]]; then
            echo "Expected updater feed and signature artifacts." >&2
            exit 1
          fi
          if gh release view desktop-updates --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release upload desktop-updates --repo "${GH_REPO}" "${updater_files[@]}" --clobber
          else
            gh release create desktop-updates --repo "${GH_REPO}" "${updater_files[@]}" --target "${GITHUB_SHA}" --title "Elegy Copilot Desktop Update Feeds" --notes "Mutable signed updater feeds. Use versioned releases for installers and changelogs."
          fi

      - name: Verify published preview download contract
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.resolve-preview.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.resolve-preview.outputs.tag_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          feed_tag="desktop-v${RELEASE_VERSION}"
          if [[ "${RELEASE_VERSION}" == *-* ]]; then
            feed_tag="${RELEASE_VERSION}"
          fi
          node scripts/desktop-release-acceptance.js \
            --repo "${GH_REPO}" \
            --tag "${RELEASE_TAG}" \
            --expected-version "${RELEASE_VERSION}" \
            --feed-tag "${feed_tag}" \
            --prerelease
