version: "3.8"

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER:-instruction-engine-relay}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-instruction-engine}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-true}
      - MAX_MESSAGE_SIZE=${MAX_MESSAGE_SIZE:-1048576}
      - DB_PATH=/app/data/relay.db
    volumes:
      - relay-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/live').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Optional: For local development with hot reload
  relay-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - relay-data-dev:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:-development-secret}
      - REQUIRE_AUTH=false
      - DB_PATH=/app/data/relay.db
    command: npm run dev
    profiles:
      - dev

volumes:
  relay-data:
  relay-data-dev:
