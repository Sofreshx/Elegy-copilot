name: WS6 Repo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate CI lockfiles
        run: node scripts/validate-ci-lockfiles.js

      - name: Validate manifest
        run: node scripts/validate-manifest.js

      - name: Validate docs graph
        run: node scripts/validate-doc-graph.js

  ws6-evidence:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        evidence_id:
          - WS6-E1
          - WS6-E2
          - WS6-E3
          - WS6-E4
          - WS6-E5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate WS6 evidence artifact
        id: generate
        shell: bash
        env:
          EVIDENCE_ID: ${{ matrix.evidence_id }}
          ARTIFACT_DIR: artifacts/ws6/${{ matrix.evidence_id }}
        run: |
          set -euo pipefail

          mkdir -p "${ARTIFACT_DIR}"
          : > "${ARTIFACT_DIR}/command.log"
          exec > >(tee -a "${ARTIFACT_DIR}/command.log") 2>&1

          echo "Generating ${EVIDENCE_ID}"

          case "${EVIDENCE_ID}" in
            WS6-E1)
              node scripts/validate-manifest.js
              node scripts/validate-doc-graph.js
              echo
              echo "README ownership excerpt"
              grep -nE 'WS6 is a post-WS1 gate|WS2 owns the primary non-Docker default behavior|WS6 non-Docker scope is compatibility/upgrade safety' README.md
              echo
              echo "Runtime permissions ownership excerpt"
              grep -nE 'WS6 compatibility/release-safety work MUST start only after the WS1 contract freeze gate is complete|WS2 owns primary non-Docker default behavior|WS6 may only constrain compatibility/upgrade safety behavior' docs/system/runtime-permissions-contracts.md
              ;;
            WS6-E2)
              node copilot-ui/server.lifecycle-proxy.test.js
              npm --prefix local-tracker run test:jest -- src/messagingGateway/__tests__/gatewayHttpServer.test.ts
              ;;
            WS6-E3)
              node copilot-ui/lib/planningPersistence.test.js
              node copilot-ui/server.runtime-health.test.js
              ;;
            WS6-E4)
              node copilot-ui/dist-electron/rollbackPolicy.test.js
              node copilot-ui/dist-electron/updatePolicy.rollback.test.js
              ;;
            WS6-E5)
              node copilot-ui/dist-electron/updater.rollback.test.js
              echo
              echo "Operational ownership note"
              echo "Release Engineering executes rollback and kill-switch changes."
              echo "On-call incident commander approves activation/deactivation."
              echo "Security Engineering co-approves trust-chain compromise responses."
              ;;
            *)
              echo "Unsupported evidence id: ${EVIDENCE_ID}" >&2
              exit 1
              ;;
          esac

          python - <<'PY'
          import json
          import os
          import pathlib

          artifact_dir = pathlib.Path(os.environ['ARTIFACT_DIR'])
          evidence_id = os.environ['EVIDENCE_ID']
          metadata = {
              'artifactName': f'ws6-evidence-{evidence_id}',
              'evidenceId': evidence_id,
              'ref': os.environ['GITHUB_REF'],
              'sha': os.environ['GITHUB_SHA'],
              'workflow': os.environ['GITHUB_WORKFLOW'],
          }
          artifact_dir.joinpath('metadata.json').write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

          (
            cd "${ARTIFACT_DIR}"
            sha256sum command.log > command.log.sha256
            sha256sum metadata.json > metadata.json.sha256
          )

      - name: Upload WS6 evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ws6-evidence-${{ matrix.evidence_id }}
          path: artifacts/ws6/${{ matrix.evidence_id }}
          if-no-files-found: error
          retention-days: 14

  ws6-artifact-gate:
    if: always()
    needs: ws6-evidence
    runs-on: ubuntu-latest
    outputs:
      complete: ${{ steps.validate.outputs.complete }}
    steps:
      - name: Download WS6 evidence artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ws6-evidence-*
          path: artifacts/ws6

      - name: Validate WS6 evidence completeness and integrity
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import pathlib
          import sys

          expected_ids = ['WS6-E1', 'WS6-E2', 'WS6-E3', 'WS6-E4', 'WS6-E5']
          expected_dirs = [f'ws6-evidence-{evidence_id}' for evidence_id in expected_ids]
          root = pathlib.Path('artifacts/ws6')

          if not root.exists():
              print('WS6 artifact root is missing.', file=sys.stderr)
              raise SystemExit(1)

          actual_dirs = sorted(path.name for path in root.iterdir() if path.is_dir())
          missing_dirs = [name for name in expected_dirs if name not in actual_dirs]
          extra_dirs = [name for name in actual_dirs if name not in expected_dirs]
          if missing_dirs or extra_dirs or len(actual_dirs) != len(expected_dirs):
              print(f'Missing WS6 artifacts: {missing_dirs}', file=sys.stderr)
              print(f'Unexpected WS6 artifacts: {extra_dirs}', file=sys.stderr)
              print(f'Observed WS6 artifacts: {actual_dirs}', file=sys.stderr)
              raise SystemExit(1)

          required_files = ['command.log', 'metadata.json', 'command.log.sha256', 'metadata.json.sha256']
          for evidence_id in expected_ids:
              artifact_dir = root / f'ws6-evidence-{evidence_id}'
              missing_files = [name for name in required_files if not (artifact_dir / name).is_file()]
              if missing_files:
                  print(f'Artifact {artifact_dir.name} is missing files: {missing_files}', file=sys.stderr)
                  raise SystemExit(1)

              metadata = json.loads((artifact_dir / 'metadata.json').read_text(encoding='utf-8'))
              if metadata.get('evidenceId') != evidence_id:
                  print(
                      f'Artifact {artifact_dir.name} metadata evidenceId {metadata.get("evidenceId")!r} does not match {evidence_id!r}.',
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
          PY

          for evidence_id in WS6-E1 WS6-E2 WS6-E3 WS6-E4 WS6-E5; do
            artifact_dir="artifacts/ws6/ws6-evidence-${evidence_id}"
            (
              cd "${artifact_dir}"
              sha256sum -c command.log.sha256
              sha256sum -c metadata.json.sha256
            )
          done

          echo "complete=true" >> "$GITHUB_OUTPUT"

  required-checks:
    if: always()
    needs:
      - build
      - ws6-evidence
      - ws6-artifact-gate
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required check contract
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ needs.build.result }}' != 'success' ]]; then
            echo "build did not succeed: ${{ needs.build.result }}" >&2
            exit 1
          fi

          if [[ '${{ needs.ws6-evidence.result }}' != 'success' ]]; then
            echo "ws6-evidence did not succeed: ${{ needs.ws6-evidence.result }}" >&2
            exit 1
          fi

          if [[ '${{ needs.ws6-artifact-gate.result }}' != 'success' ]]; then
            echo "ws6-artifact-gate did not succeed: ${{ needs.ws6-artifact-gate.result }}" >&2
            exit 1
          fi

          if [[ '${{ needs.ws6-artifact-gate.outputs.complete }}' != 'true' ]]; then
            echo "ws6-artifact-gate did not report complete=true." >&2
            exit 1
          fi
