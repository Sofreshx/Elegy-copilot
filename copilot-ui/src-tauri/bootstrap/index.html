<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elegy Copilot</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #1b232d 0, #111418 62%);
        color: #edf0f4;
      }

      .boot-shell {
        display: grid;
        gap: 1rem;
        justify-items: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .boot-mark {
        width: min(22vw, 4.5rem);
        height: auto;
        filter: drop-shadow(0 18px 28px rgba(17, 20, 24, 0.28));
      }

      .boot-copy {
        display: grid;
        gap: 0.35rem;
      }

      .boot-copy h1,
      .boot-copy p {
        margin: 0;
      }

      .boot-copy h1 {
        font-size: 1.08rem;
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      .boot-copy p {
        color: #9ca6b4;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="boot-shell">
      <svg class="boot-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="boot-bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1F252D" />
            <stop offset="1" stop-color="#111418" />
          </linearGradient>
          <linearGradient id="boot-glyph" x1="22" y1="16" x2="44" y2="48" gradientUnits="userSpaceOnUse">
            <stop stop-color="#F5F8FB" />
            <stop offset="1" stop-color="#DEE6ED" />
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#boot-bg)" />
        <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="17.25" stroke="#2E3844" stroke-width="1.5" />
        <rect x="22" y="16" width="6" height="32" rx="3" fill="url(#boot-glyph)" />
        <rect x="22" y="16" width="22" height="6" rx="3" fill="url(#boot-glyph)" />
        <rect x="22" y="29" width="18" height="6" rx="3" fill="url(#boot-glyph)" />
        <rect x="22" y="42" width="22" height="6" rx="3" fill="url(#boot-glyph)" />
        <circle cx="46.5" cy="18.5" r="5.5" fill="#6EAFA8" />
        <circle cx="44.5" cy="16.5" r="1.5" fill="#D6F2EE" fill-opacity="0.85" />
      </svg>
      <div class="boot-copy">
        <h1>Elegy Copilot</h1>
        <p>Starting workspace...</p>
      </div>
    </div>
  </body>
</html>
