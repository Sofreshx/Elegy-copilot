<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elegy Copilot</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #1b232d 0, #111418 62%);
        color: #edf0f4;
      }

      .boot-shell {
        display: grid;
        gap: 1rem;
        justify-items: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }

      .boot-mark {
        width: min(22vw, 4.5rem);
        height: auto;
        filter: drop-shadow(0 18px 28px rgba(17, 20, 24, 0.28));
      }

      .boot-copy {
        display: grid;
        gap: 0.35rem;
      }

      .boot-copy h1,
      .boot-copy p {
        margin: 0;
      }

      .boot-copy h1 {
        font-size: 1.08rem;
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      .boot-copy p {
        color: #9ca6b4;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="boot-shell">
      <svg class="boot-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="boot-bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
            <stop stop-color="#222A33" />
            <stop offset="1" stop-color="#101317" />
          </linearGradient>
          <linearGradient id="boot-glyph" x1="18" y1="20" x2="46" y2="44" gradientUnits="userSpaceOnUse">
            <stop stop-color="#F8FAFC" />
            <stop offset="1" stop-color="#D8E2EA" />
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#boot-bg)" />
        <rect x="4.75" y="4.75" width="54.5" height="54.5" rx="17.25" stroke="#2F3A45" stroke-width="1.5" />
        <path d="M15.5 32C19.6 24.8 25.1 21.2 32 21.2C38.9 21.2 44.4 24.8 48.5 32C44.4 39.2 38.9 42.8 32 42.8C25.1 42.8 19.6 39.2 15.5 32Z" stroke="url(#boot-glyph)" stroke-width="5" stroke-linejoin="round" />
        <circle cx="32" cy="32" r="7.2" fill="url(#boot-glyph)" />
        <circle cx="32" cy="32" r="3.2" fill="#151A20" />
        <circle cx="45.5" cy="22.5" r="5.5" fill="#6EAFA8" />
        <circle cx="43.6" cy="20.6" r="1.4" fill="#D6F2EE" fill-opacity="0.9" />
      </svg>
      <div class="boot-copy">
        <h1>Elegy Copilot</h1>
        <p>Starting workspace...</p>
      </div>
    </div>
  </body>
</html>
