name: Elegy Copilot Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Desktop tag to release (desktop-v*)'
        required: true
        type: string
      publish_mode:
        description: 'Whether to keep the GitHub release as a draft or publish it immediately'
        required: false
        default: 'published'
        type: choice
        options:
          - draft
          - published

permissions:
  contents: write

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      publish_mode: ${{ steps.meta.outputs.publish_mode }}
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate publish-repo topology (fail closed)
        shell: bash
        run: |
          set -euo pipefail
          expected_repo="$(python - <<'PY'
          import json
          import pathlib

          package_json = json.loads(pathlib.Path('copilot-ui/package.json').read_text(encoding='utf-8'))
          publish_repository = ((package_json.get('desktopRelease') or {}).get('publishRepository') or '').strip()
          if not publish_repository:
              raise SystemExit('Could not resolve desktopRelease.publishRepository from copilot-ui/package.json')
          print(publish_repository)
          PY
          )"
          if [[ "${expected_repo}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "Desktop release must run from ${expected_repo}; current repository is ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Validate signing endpoint configuration (fail closed)
        shell: bash
        env:
          SIGNING_SERVICE_URL: ${{ vars.DESKTOP_SIGNING_SERVICE_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${SIGNING_SERVICE_URL}" ]]; then
            echo "DESKTOP_SIGNING_SERVICE_URL is not configured. Refusing to build a stable desktop release that cannot be signed." >&2
            exit 1
          fi

      - name: Resolve release tag and channel
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Release tag is required. Use desktop-v* tags or set workflow_dispatch input release_tag." >&2
            exit 1
          fi

          if [[ ! "${tag}" =~ ^desktop-v ]]; then
            echo "Invalid tag '${tag}'. Expected prefix desktop-v." >&2
            exit 1
          fi

          version="${tag#desktop-v}"
          if [[ -z "${version}" ]]; then
            echo "Could not derive release version from tag '${tag}'." >&2
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid desktop release version '${version}'. Expected semver after the desktop-v prefix." >&2
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Tag '${tag}' does not exist in this repository." >&2
            exit 1
          fi

          package_version="$(python - "${tag}" <<'PY'
          import json
          import subprocess
          import sys

          tag = sys.argv[1]
          payload = subprocess.check_output(
              ["git", "show", f"{tag}:copilot-ui/package.json"],
              text=True,
          )
          print(json.loads(payload)["version"])
          PY
          )"

          if [[ "${package_version}" != "${version}" ]]; then
            echo "Desktop tag '${tag}' resolves to version '${version}', but copilot-ui/package.json at that tag is '${package_version}'." >&2
            exit 1
          fi

          prerelease="false"
          if [[ "${version}" == *-* ]]; then
            prerelease="true"
          fi

          publish_mode="${{ inputs.publish_mode }}"
          if [[ -z "${publish_mode}" ]]; then
            publish_mode="published"
          fi

          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_version=${version}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "publish_mode=${publish_mode}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stable desktop promotion preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/desktop-stable-promotion-preflight.js --desktop-tag "${{ steps.meta.outputs.release_tag }}"

  build-windows:
    needs: resolve-release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.release_tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json

      - name: CI lockfile preflight
        run: node scripts/validate-ci-lockfiles.js

      - name: Install workspace dependencies
        run: npm ci

      - name: Build and stage Windows package
        run: npm --prefix copilot-ui run desktop:preview:stage

      - name: Upload unsigned Windows package
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-unsigned
          path: release-artifacts/windows-tauri
          if-no-files-found: error
          retention-days: 14

  sign-windows:
    needs:
      - resolve-release
      - build-windows
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    env:
      SIGNING_SERVICE_URL: ${{ vars.DESKTOP_SIGNING_SERVICE_URL }}
      SIGNING_SERVICE_AUDIENCE: ${{ vars.DESKTOP_SIGNING_SERVICE_AUDIENCE || 'elegy-copilot-desktop-release' }}
      SIGNING_SERVICE_API_KEY: ${{ secrets.DESKTOP_SIGNING_SERVICE_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.release_tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download unsigned Windows package
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-unsigned
          path: release-artifacts/windows-tauri

      - name: Enforce signing endpoint configuration (fail closed)
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_SERVICE_URL)) {
            Write-Error "DESKTOP_SIGNING_SERVICE_URL is not configured. Refusing to publish unsigned desktop artifacts."
            exit 1
          }

      - name: OIDC signing contract (Windows Authenticode)
        shell: pwsh
        run: |
          $releaseRoot = (Resolve-Path 'release-artifacts/windows-tauri').Path
          $releaseManifestPath = Join-Path $releaseRoot 'release-manifest.json'
          if (-not (Test-Path $releaseManifestPath)) {
            Write-Error "Tauri release manifest is missing at $releaseManifestPath."
            exit 1
          }

          $releaseManifest = Get-Content -Path $releaseManifestPath -Raw | ConvertFrom-Json
          $relativeInstallerPath = [string]$releaseManifest.artifact.relativePath
          if ([string]::IsNullOrWhiteSpace($relativeInstallerPath)) {
            Write-Error "release-manifest.json declared an empty installer path."
            exit 1
          }

          $candidateInstallerPath = Join-Path $releaseRoot $relativeInstallerPath
          if (-not (Test-Path $candidateInstallerPath)) {
            Write-Error "The Windows installer declared in release-manifest.json was not found: $candidateInstallerPath"
            exit 1
          }

          $resolvedInstallerPath = [System.IO.Path]::GetFullPath((Resolve-Path $candidateInstallerPath).Path)
          if (-not $resolvedInstallerPath.StartsWith($releaseRoot, [System.StringComparison]::OrdinalIgnoreCase)) {
            Write-Error "The Windows installer declared in release-manifest.json resolves outside the release directory: $resolvedInstallerPath"
            exit 1
          }

          if ([System.IO.Path]::GetExtension($resolvedInstallerPath) -ne '.exe') {
            Write-Error "release-manifest.json declared a non-executable Windows installer path: $resolvedInstallerPath"
            exit 1
          }

          $installer = Get-Item -LiteralPath $resolvedInstallerPath
          $audience = if ([string]::IsNullOrWhiteSpace($env:SIGNING_SERVICE_AUDIENCE)) { 'elegy-copilot-desktop-release' } else { $env:SIGNING_SERVICE_AUDIENCE }
          $oidcUri = "$($env:ACTIONS_ID_TOKEN_REQUEST_URL)&audience=$([uri]::EscapeDataString($audience))"
          $oidcHeaders = @{ Authorization = "Bearer $($env:ACTIONS_ID_TOKEN_REQUEST_TOKEN)" }
          $oidcResponse = Invoke-RestMethod -Method Get -Uri $oidcUri -Headers $oidcHeaders

          if (-not $oidcResponse.value) {
            Write-Error "OIDC token exchange failed; signing request cannot proceed."
            exit 1
          }

          $payload = @{
            operation = 'windows-authenticode'
            repository = '${{ github.repository }}'
            releaseTag = '${{ needs.resolve-release.outputs.release_tag }}'
            artifactPath = $installer.FullName
            expectedOutputs = @{
              signedArtifactPath = 'release-artifacts/windows-tauri/windows-signed-installer.exe'
              signatureManifestPath = 'release-artifacts/windows-tauri/signature-manifest.json'
              provenanceAttestationPath = 'release-artifacts/windows-tauri/provenance.attestation.json'
            }
          }

          $requestHeaders = @{
            Authorization = "Bearer $($oidcResponse.value)"
            'Content-Type' = 'application/json'
          }

          if (-not [string]::IsNullOrWhiteSpace($env:SIGNING_SERVICE_API_KEY)) {
            $requestHeaders['X-Signing-Api-Key'] = $env:SIGNING_SERVICE_API_KEY
          }

          $response = Invoke-RestMethod -Method Post -Uri $env:SIGNING_SERVICE_URL -Headers $requestHeaders -Body ($payload | ConvertTo-Json -Depth 6)
          $response | ConvertTo-Json -Depth 10 | Out-File -FilePath 'release-artifacts/windows-tauri/signing-response.json' -Encoding utf8

          $requiredKeys = @('signedArtifactPath', 'signatureManifestPath', 'provenanceAttestationPath')
          foreach ($key in $requiredKeys) {
            if (-not $response.$key) {
              Write-Error "Signing service response is missing required field '$key'."
              exit 1
            }
          }

          function Resolve-ContractPath([string] $value) {
            if ([System.IO.Path]::IsPathRooted($value)) {
              return $value
            }

            return Join-Path $env:GITHUB_WORKSPACE $value
          }

          $signedInstaller = Resolve-ContractPath $response.signedArtifactPath
          $signatureManifest = Resolve-ContractPath $response.signatureManifestPath
          $provenanceAttestation = Resolve-ContractPath $response.provenanceAttestationPath

          foreach ($path in @($signedInstaller, $signatureManifest, $provenanceAttestation)) {
            if (-not (Test-Path $path)) {
              Write-Error "Required signing evidence is missing: $path"
              exit 1
            }
          }

          Copy-Item $signedInstaller $resolvedInstallerPath -Force

          $updatedManifest = Get-Content -Path $releaseManifestPath -Raw | ConvertFrom-Json
          $updatedInstaller = Get-Item -LiteralPath $resolvedInstallerPath
          $hash = (Get-FileHash -LiteralPath $resolvedInstallerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $updatedManifest.artifact.size = $updatedInstaller.Length
          $updatedManifest.artifact.sha256 = $hash
          ($updatedManifest | ConvertTo-Json -Depth 10) + "`n" | Set-Content -Path $releaseManifestPath -Encoding utf8

      - name: Upload signed Windows artifacts and evidence
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-signed
          path: release-artifacts/windows-tauri
          if-no-files-found: error
          retention-days: 30

  publish-release:
    needs:
      - resolve-release
      - sign-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signed Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-signed
          path: artifacts/windows-tauri

      - name: Publish desktop GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RELEASE_NAME: Elegy Copilot Desktop ${{ needs.resolve-release.outputs.release_version }}
          RELEASE_PRERELEASE: ${{ needs.resolve-release.outputs.prerelease }}
          PUBLISH_MODE: ${{ needs.resolve-release.outputs.publish_mode }}
        run: |
          set -euo pipefail

          mapfile -t release_files < <(find artifacts/windows-tauri -type f | sort)
          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No signed desktop release files were found." >&2
            exit 1
          fi

          draft_flag=(--draft=false)
          if [[ "${PUBLISH_MODE}" == "draft" ]]; then
            draft_flag=(--draft)
          fi

          prerelease_flag=(--prerelease=false)
          if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --repo "${GH_REPO}" --title "${RELEASE_NAME}" "${draft_flag[@]}" "${prerelease_flag[@]}"
            gh release upload "${RELEASE_TAG}" --repo "${GH_REPO}" "${release_files[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" --repo "${GH_REPO}" "${release_files[@]}" --title "${RELEASE_NAME}" --generate-notes "${draft_flag[@]}" "${prerelease_flag[@]}"
          fi
