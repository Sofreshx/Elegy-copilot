name: Elegy Copilot Desktop Version Tag Helper

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to tag from'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  tag-desktop-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.ref }}

      - name: Validate publish-repo topology (fail closed)
        shell: bash
        run: |
          set -euo pipefail
          expected_repo="$(python - <<'PY'
          import json
          import pathlib

          package_json = json.loads(pathlib.Path('copilot-ui/package.json').read_text(encoding='utf-8'))
          publish_repository = ((package_json.get('desktopRelease') or {}).get('publishRepository') or '').strip()
          if not publish_repository:
              raise SystemExit('Could not resolve desktopRelease.publishRepository from copilot-ui/package.json')
          print(publish_repository)
          PY
          )"
          if [[ "${expected_repo}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "Desktop version tags must be created from ${expected_repo}; current repository is ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json

      - name: CI lockfile preflight
        run: node scripts/validate-ci-lockfiles.js

      - name: Install dependencies
        run: npm ci

      - name: Stable desktop promotion preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/desktop-stable-promotion-preflight.js --selected-ref HEAD

      - name: Create desktop release tag helper result
        run: node scripts/create-desktop-release-tag.js --desktop-release
