name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Validate Changesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: CI lockfile preflight
        run: node scripts/validate-ci-lockfiles.js

      - name: Install dependencies
        run: npm ci

      - name: Check for changesets
        run: npx changeset status --since=origin/main

      - name: Validate changeset targets
        run: |
          # Extract package names from pending changesets and validate via tag mapper
          node -e "
            const fs = require('fs');
            const path = require('path');
            const { validateChangesetTargets } = require('./scripts/changeset-tag-mapper');
            const changesetDir = path.join('.changeset');
            const files = fs.readdirSync(changesetDir).filter(f => f.endsWith('.md') && f !== 'README.md');
            if (files.length === 0) {
              console.log('No pending changesets found — skipping validation.');
              process.exit(0);
            }
            let hasErrors = false;
            for (const file of files) {
              const content = fs.readFileSync(path.join(changesetDir, file), 'utf8');
              // Changesets format: YAML frontmatter with package names
              const frontmatter = content.split('---')[1];
              if (!frontmatter) continue;
              const packages = frontmatter.trim().split('\n')
                .map(line => line.replace(/['\"]?:.*$/, '').trim())
                .filter(Boolean);
              const result = validateChangesetTargets(packages);
              if (!result.valid) {
                console.error('ERROR in ' + file + ': ' + result.error);
                hasErrors = true;
              } else {
                console.log('OK: ' + file + ' -> ' + packages.join(', '));
              }
            }
            if (hasErrors) process.exit(1);
          "
