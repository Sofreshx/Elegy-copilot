name: Cloud Relay CI

on:
  push:
    branches: [main]
    paths:
      - 'cloud-relay/**'
      - '.github/workflows/cloud-relay-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cloud-relay/**'
      - '.github/workflows/cloud-relay-ci.yml'

defaults:
  run:
    working-directory: cloud-relay

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: cloud-relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
