name: Elegy Copilot Desktop Version Tag Helper

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to tag from'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  tag-desktop-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.ref }}

      - name: Validate publish-repo topology (fail closed)
        shell: bash
        run: |
          set -euo pipefail
          expected_repo="$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path('copilot-ui/electron-builder.yml').read_text(encoding='utf-8')
          owner = re.search(r'(?m)^  owner:\s*(.+?)\s*$', text)
          repo = re.search(r'(?m)^  repo:\s*(.+?)\s*$', text)
          if not owner or not repo:
              raise SystemExit('Could not resolve publish owner/repo from copilot-ui/electron-builder.yml')
          def clean(value):
              return value.strip().strip('"').strip("'")
          print(f"{clean(owner.group(1))}/{clean(repo.group(1))}")
          PY
          )"
          if [[ "${expected_repo}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "Desktop version tags must be created from ${expected_repo}; current repository is ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json

      - name: CI lockfile preflight
        run: node scripts/validate-ci-lockfiles.js

      - name: Install dependencies
        run: npm ci

      - name: Create desktop release tag helper result
        run: node scripts/create-desktop-release-tag.js --desktop-release
