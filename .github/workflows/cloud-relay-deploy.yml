name: Deploy Cloud Relay

on:
  push:
    branches: [main]
    paths:
      - 'cloud-relay/**'
      - '.github/workflows/cloud-relay-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  RELAY_IMAGE: ghcr.io/sofreshx/instruction-engine-cloud-relay

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: cloud-relay
          file: cloud-relay/Dockerfile
          push: true
          tags: |
            ${{ env.RELAY_IMAGE }}:latest
            ${{ env.RELAY_IMAGE }}:${{ github.sha }}

      - name: Deploy relay via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            mkdir -p /srv/apps/instruction-engine-relay
            cd /srv/apps/instruction-engine-relay

            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/cloud-relay/docker-compose.prod.yml -o docker-compose.yml

            cat << 'EOF' > .env
            JWT_SECRET=${{ secrets.RELAY_JWT_SECRET }}
            JWT_ISSUER=${{ vars.RELAY_JWT_ISSUER || 'instruction-engine-relay' }}
            JWT_AUDIENCE=${{ vars.RELAY_JWT_AUDIENCE || 'instruction-engine' }}
            REQUIRE_AUTH=${{ vars.RELAY_REQUIRE_AUTH || 'true' }}
            MAX_MESSAGE_SIZE=${{ vars.RELAY_MAX_MESSAGE_SIZE || '1048576' }}
            GITHUB_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.OAUTH_CLIENT_SECRET }}
            GITHUB_REDIRECT_URI=${{ secrets.RELAY_GITHUB_REDIRECT_URI }}
            EOF

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
