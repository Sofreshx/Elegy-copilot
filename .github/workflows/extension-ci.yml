name: Extension CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'vscode-skill-installer/**'
      - '.github/workflows/extension-ci.yml'

defaults:
  run:
    working-directory: vscode-skill-installer

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: vscode-skill-installer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Compile TypeScript
        run: npm run compile

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run tests
        run: xvfb-run --auto-servernum npm test --if-present

      - name: Package extension
        run: npx @vscode/vsce package --out skill-installer.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-installer-vsix
          path: vscode-skill-installer/skill-installer.vsix
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: skill-installer-vsix
          path: ./artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/skill-installer.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mobile-build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && 
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')

    defaults:
      run:
        working-directory: mobile-companion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: mobile-companion/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build PWA
        run: npm run build

      - name: Upload PWA build
        uses: actions/upload-artifact@v4
        with:
          name: mobile-companion-pwa
          path: mobile-companion/dist
          retention-days: 30
