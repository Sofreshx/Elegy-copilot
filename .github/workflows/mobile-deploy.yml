name: Build Mobile Companion (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: mobile-companion

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile-companion/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build PWA
        run: npm run build
        env:
          VITE_RELAY_HTTP_URL: ${{ vars.RELAY_HTTP_URL || '' }}
          VITE_RELAY_WS_URL: ${{ vars.RELAY_WS_URL || '' }}
          VITE_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-companion-dist
          path: mobile-companion/dist
