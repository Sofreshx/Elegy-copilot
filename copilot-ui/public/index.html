<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Elegy Copilot UI</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #f4f7ff;
        color: #1b2340;
      }

      main {
        max-width: 56rem;
        margin: 4rem auto;
        padding: 1.5rem;
        border: 1px solid #d8e1ff;
        border-radius: 1rem;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(30, 47, 107, 0.12);
      }

      h1 {
        margin: 0 0 0.5rem;
      }

      p {
        line-height: 1.5;
      }

      code {
        background: #edf2ff;
        border-radius: 0.4rem;
        padding: 0.1rem 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Elegy Copilot UI Fallback</h1>
      <p>
        The legacy vanilla dashboard has been retired. The active React UI is served from
        <code>copilot-ui/ui-dist</code> when available.
      </p>
      <p>
        If you see this fallback page, build the UI bundle with
        <code>npm --prefix copilot-ui run ui:build</code>.
      </p>
    </main>
  </body>
</html>
