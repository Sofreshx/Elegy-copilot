name: Nightly Tests (Full)

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

jobs:
  full-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: CI lockfile preflight
        run: node scripts/validate-ci-lockfiles.js

      - name: Install workspace dependencies
        run: npm ci

      - name: Run ledger core tests
        run: node --test test-ledger-core.test.js
        working-directory: scripts

      - name: Run local-tracker tests (force)
        run: npm test -- --force
        working-directory: local-tracker

      - name: Run copilot-ui tests (force)
        run: npm test -- --force
        working-directory: copilot-ui

      - name: Run scripts tests (force)
        run: npm test -- --force
        working-directory: scripts
