# Remote Agent Dispatch Workflow
# Enables manually-triggered agent sessions in cloud environments
# 
# Security: Uses workflow_dispatch with strict input validation
# Rate limiting: Enforce via the caller / webhook integration (outside this workflow)

name: Remote Agent Session

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command type (start, stop, status)'
        required: true
        type: choice
        options:
          - start
          - stop
          - status
      agent_name:
        description: 'Agent to invoke (allowlisted)'
        required: true
        type: choice
        options:
          - executive2-planner
          - debugger
          - feature-creator
          - code-reviewer
          - test-runner
          - code-explorer
      prompt:
        description: 'Agent prompt (max 4000 chars)'
        required: false
        type: string
      session_id:
        description: 'Session ID from caller'
        required: true
        type: string
      webhook_url:
        description: 'Relay webhook for status updates'
        required: true
        type: string
      user_id:
        description: 'Authenticated user ID from relay'
        required: true
        type: string

env:
  MAX_PROMPT_LENGTH: 4000
  ALLOWED_AGENTS: 'executive2-planner,debugger,feature-creator,code-reviewer,test-runner,code-explorer'

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
      error: ${{ steps.validate.outputs.error }}
    steps:
      - name: Validate inputs
        id: validate
        run: |
          # Validate session ID format (UUID)
          if ! [[ "${{ inputs.session_id }}" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]; then
            echo "error=Invalid session ID format" >> $GITHUB_OUTPUT
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Validate prompt length
          PROMPT_LENGTH=${#PROMPT}
          if [ "$PROMPT_LENGTH" -gt "$MAX_PROMPT_LENGTH" ]; then
            echo "error=Prompt exceeds maximum length ($MAX_PROMPT_LENGTH chars)" >> $GITHUB_OUTPUT
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Validate agent name is in allowlist
          if ! echo "$ALLOWED_AGENTS" | grep -q "${{ inputs.agent_name }}"; then
            echo "error=Agent not in allowlist: ${{ inputs.agent_name }}" >> $GITHUB_OUTPUT
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "valid=true" >> $GITHUB_OUTPUT
        env:
          PROMPT: ${{ inputs.prompt }}

      - name: Report validation failure
        if: steps.validate.outputs.valid == 'false'
        run: |
          curl -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RELAY_WEBHOOK_SECRET }}" \
            -d '{
              "workflow_run_id": "${{ github.run_id }}",
              "session_id": "${{ inputs.session_id }}",
              "user_id": "${{ inputs.user_id }}",
              "status": "failed",
              "error": "${{ steps.validate.outputs.error }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || true

  execute-agent:
    name: Execute Agent
    needs: validate-inputs
    if: needs.validate-inputs.outputs.valid == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Report status - started
        run: |
          curl -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RELAY_WEBHOOK_SECRET }}" \
            -d '{
              "workflow_run_id": "${{ github.run_id }}",
              "session_id": "${{ inputs.session_id }}",
              "user_id": "${{ inputs.user_id }}",
              "status": "running",
              "logs_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || true

      - name: Handle start command
        if: inputs.command == 'start'
        id: start
        run: |
          echo "Starting agent session..."
          echo "Agent: ${{ inputs.agent_name }}"
          echo "Session: ${{ inputs.session_id }}"
          echo "Prompt: ${PROMPT:0:100}..."
          
          # In a real implementation, this would:
          # 1. Start a Codespace or container with VS Code
          # 2. Initialize Copilot with the specified agent
          # 3. Execute the prompt
          # 4. Stream results back via WebSocket
          #
          # For now, this is a placeholder that demonstrates the workflow structure
          
          echo "result=Agent session initiated" >> $GITHUB_OUTPUT
        env:
          PROMPT: ${{ inputs.prompt }}

      - name: Handle stop command
        if: inputs.command == 'stop'
        id: stop
        run: |
          echo "Stopping agent session: ${{ inputs.session_id }}"
          # Would terminate running Codespace/container
          echo "result=Agent session stopped" >> $GITHUB_OUTPUT

      - name: Handle status command
        if: inputs.command == 'status'
        id: status
        run: |
          echo "Checking status of session: ${{ inputs.session_id }}"
          # Would query Codespace/container status
          echo "result=Session status retrieved" >> $GITHUB_OUTPUT

      - name: Report status - completed
        if: success()
        run: |
          RESULT=""
          if [ "${{ inputs.command }}" == "start" ]; then
            RESULT="${{ steps.start.outputs.result }}"
          elif [ "${{ inputs.command }}" == "stop" ]; then
            RESULT="${{ steps.stop.outputs.result }}"
          else
            RESULT="${{ steps.status.outputs.result }}"
          fi
          
          curl -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RELAY_WEBHOOK_SECRET }}" \
            -d '{
              "workflow_run_id": "${{ github.run_id }}",
              "session_id": "${{ inputs.session_id }}",
              "user_id": "${{ inputs.user_id }}",
              "status": "completed",
              "result": "'"$RESULT"'",
              "logs_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || true

      - name: Report status - failed
        if: failure()
        run: |
          curl -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RELAY_WEBHOOK_SECRET }}" \
            -d '{
              "workflow_run_id": "${{ github.run_id }}",
              "session_id": "${{ inputs.session_id }}",
              "user_id": "${{ inputs.user_id }}",
              "status": "failed",
              "error": "Workflow execution failed",
              "logs_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }' || true

  cleanup:
    name: Cleanup
    needs: [validate-inputs, execute-agent]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup temporary resources
        run: |
          echo "Cleaning up resources for session: ${{ inputs.session_id }}"
          # Would cleanup any temporary Codespaces/containers
          # This runs regardless of success/failure

      - name: Final status report
        if: needs.execute-agent.result == 'skipped'
        run: |
          # Only report if execute-agent was skipped due to validation failure
          echo "Workflow completed with validation errors"
