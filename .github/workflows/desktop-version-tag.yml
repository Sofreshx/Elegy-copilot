name: Desktop Version Tag Helper

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to tag from'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  tag-desktop-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: CI lockfile preflight
        run: node scripts/validate-ci-lockfiles.js

      - name: Install dependencies
        run: npm ci

      - name: Create desktop release tag helper result
        run: node scripts/create-desktop-release-tag.js --desktop-release
