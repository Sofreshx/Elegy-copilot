appId: dev.elegycopilot.desktop
productName: Elegy Copilot
directories:
  output: release
  buildResources: resources
files:
  - dist-electron/**
  - server.js
  - lib/**
  - routes/**
  - ui-dist/**
  - public/**
  - package.json
extraResources:
  - from: ../engine-assets
    to: engine-assets
    filter:
      - '**/*'
  - from: ../local-tracker/dist
    to: local-tracker/dist
    filter:
      - '**/*'
  - from: ../local-tracker/node_modules
    to: local-tracker/node_modules
    filter:
      - '**/*'
  - from: ../local-tracker/package.json
    to: local-tracker/package.json
  - from: ../scripts
    to: scripts
    filter:
      - cli-*.ps1
      - cli-*.sh
      - mcp-env.ps1
      - mcp-env.sh
      - validate-policy-lockfiles.js
      - vscode-settings-patch.mjs
extraMetadata:
  main: dist-electron/main.js
win:
  signAndEditExecutable: false
  target:
    - nsis
  artifactName: elegy-copilot-${version}-${os}-${arch}.${ext}
publish:
  provider: github
  owner: Sofreshx
  repo: Elegy-copilot
  releaseType: draft
