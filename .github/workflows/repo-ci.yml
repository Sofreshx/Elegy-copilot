name: Repo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repo-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate CI lockfiles
        run: node scripts/validate-ci-lockfiles.js

      - name: Generate CLI artifacts
        run: |
          node scripts/generate-cli-manifest.mjs
          node scripts/generate-policy-lockfiles.js

      - name: Validate policy lockfiles
        run: node scripts/validate-policy-lockfiles.js

      - name: Validate manifest
        run: node scripts/validate-manifest.js

      - name: Validate docs graph
        run: node scripts/validate-doc-graph.js

      - name: Check docs dead links
        run: node scripts/check-docs-dead-links.mjs

      - name: Validate guidelines wiring
        run: node scripts/validate-guidelines-wiring.mjs

      - name: Build UI (produces ui-dist for sidecar validation)
        run: npm --prefix copilot-ui run ui:build

      - name: Build local-tracker (produces dist for sidecar validation)
        run: npm --prefix local-tracker run build

      - name: Build local-repo-mcp (produces dist for sidecar validation)
        run: npm --prefix local-repo-mcp run build

      - name: Tauri config preflight (Linux)
        run: npm --prefix copilot-ui run tauri:check:linux

      - name: Validate Tauri sidecar layout
        run: npm --prefix copilot-ui run validate:tauri-node-sidecar-layout

      - name: Run UI smoke tests
        run: node copilot-ui/tests/ui-react-smoke.test.js

      - name: Run runtime startup contract tests
        run: node copilot-ui/tests/runtime-startup-contract.test.js

      - name: Run backend tests
        run: node copilot-ui/lib/repoInventoryService.test.js

  quality:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate repository-owned test artifacts
        run: |
          node scripts/generate-cli-manifest.mjs
          node scripts/generate-policy-lockfiles.js

      - name: Run repository quality gate
        run: npm run quality:push

  desktop-tauri-preview:
    needs: build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Setup MSVC build environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            copilot-ui/package-lock.json
            local-tracker/package-lock.json
            scripts/package-lock.json

      - name: Install workspace dependencies
        run: npm ci
        env:
          npm_config_msvs_version: '2022'

      - name: Generate CLI artifacts
        run: |
          node scripts/generate-cli-manifest.mjs
          node scripts/generate-policy-lockfiles.js

      - name: Prepare CI-only Tauri updater signing key
        run: node scripts/prepare-ci-tauri-updater-signing-key.js

      - name: Build and stage Tauri desktop preview
        run: npm --prefix copilot-ui run desktop:preview:stage

  required-checks:
    if: always()
    needs:
      - build
      - quality
      - desktop-tauri-preview
    runs-on: ubuntu-latest
    steps:
      - name: Enforce required check contract
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ needs.build.result }}' != 'success' ]]; then
            echo "build did not succeed: ${{ needs.build.result }}" >&2
            exit 1
          fi

          if [[ '${{ needs.desktop-tauri-preview.result }}' != 'success' ]]; then
            echo "desktop-tauri-preview did not succeed: ${{ needs.desktop-tauri-preview.result }}" >&2
            exit 1
          fi

          if [[ '${{ needs.quality.result }}' != 'success' ]]; then
            echo "quality did not succeed: ${{ needs.quality.result }}" >&2
            exit 1
          fi
